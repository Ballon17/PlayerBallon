<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALLON PRO | Link Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0A0000; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1A0505; border: 1px solid #FF0000; border-radius: 15px; padding: 25px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .form-control { background: #000; border: 1px solid #444; color: white; border-radius: 10px; }
        .form-control:focus { background: #050000; border-color: #FF0000; color: white; box-shadow: 0 0 10px #FF0000; }
        .btn-red { background: #FF0000; color: white; font-weight: bold; border-radius: 10px; padding: 12px; border: none; }
        .btn-red:hover { background: #B71C1C; color: white; }
        .result-box { background: #222; padding: 15px; border-radius: 10px; border: 1px dashed #FF0000; word-break: break-all; font-family: monospace; color: #00FF00; margin-top: 20px; display: none; }
        label { color: #EF9A9A; font-weight: bold; margin-top: 10px; }
        .badge-pro { background: #FF0000; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2>PLAYER <span style="color: #FF0000;">BALLON PRO</span></h2>
        <p class="text-secondary">مستخرج الروابط المشفرة لنظام Deep Links</p>
    </div>

    <div class="card mx-auto" style="max-width: 600px;">
        <h4 class="mb-4 text-center">إنشاء رابط مشفر <span class="badge-pro">Base64</span></h4>
        
        <label>رابط الفيديو المباشر (Direct URL):</label>
        <input type="text" id="videoUrl" class="form-control" placeholder="http://server.com/live.m3u8">

        <label>اسم القناة (اختياري):</label>
        <input type="text" id="channelName" class="form-control" placeholder="beIN Sports HD">

        <label>الرأس (User-Agent) - اختياري:</label>
        <input type="text" id="userAgent" class="form-control" placeholder="PlayerBallon/1.0">

        <button class="btn-red w-100 mt-4" onclick="generateLink()">توليد الرابط المشفر الآن</button>

        <div id="resultArea" class="result-box">
            <p style="color: white; font-size: 14px;">انسخ هذا الرابط وضعه في AppCreator24:</p>
            <span id="finalLink"></span>
            <button class="btn btn-sm btn-outline-light w-100 mt-3" onclick="copyLink()">نسخ الرابط</button>
        </div>
    </div>
</div>

<script>
    function generateLink() {
        const url = document.getElementById('videoUrl').value.trim();
        const ua = document.getElementById('userAgent').value.trim();
        
        if (!url) {
            alert("الرجاء إدخال رابط الفيديو أولاً!");
            return;
        }

        // 1. تشفير الرابط لـ Base64
        const encodedUrl = btoa(unescape(encodeURIComponent(url)));

        // 2. بناء الرابط النهائي الذي سيفتح تطبيقك عبر الجسر
        // سنستخدم رابط index.html الذي أنشأناه سابقاً كجسر
        const baseBridge = "https://ballon17.github.io/PlayerBallon/";
        const finalUrl = `${baseBridge}?url=${encodeURIComponent(url)}${ua ? '&ua=' + encodeURIComponent(ua) : ''}`;

        // إظهار النتيجة
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('finalLink').innerText = finalUrl;
    }

    function copyLink() {
        const link = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(link);
        alert("تم نسخ الرابط بنجاح!");
    }
</script>

</body>
</html>
