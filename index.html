<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayerBallon Pro | Secure Redirect</title>
    <style>
        body { background: #0F172A; color: white; text-align: center; font-family: sans-serif; padding-top: 80px; margin: 0; }
        .loader { border: 6px solid #1E293B; border-top: 6px solid #FF0000; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #FF0000; margin-bottom: 10px; }
        .btn-download { display: inline-block; background: #FF0000; color: white; padding: 15px 30px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
        #manual-check { display: none; margin-top: 30px; padding: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="msg">جاري فتح المشغل...</h2>
    <p id="sub-msg">برجاء الانتظار، يتم فك التشفير والتحويل</p>

    <!-- هذا الجزء سيظهر فقط إذا فشل فتح التطبيق -->
    <div id="manual-check">
        <p>إذا لم يفتح التطبيق تلقائياً، فهو غير مثبت على هاتفك</p>
        <a href="https://github.com/Ballon17/PlayerBallon/raw/main/app-debug.apk" class="btn-download">تحميل المشغل APK الآن</a>
    </div>

    <script>
        window.onload = function() {
            const apkUrl = "https://github.com/Ballon17/PlayerBallon/raw/main/app-debug.apk";
            const params = new URLSearchParams(window.location.search);
            const rawUrl = params.get('url'); 

            if (rawUrl) {
                const encodedUrl = btoa(unescape(encodeURIComponent(rawUrl)));
                const ua = params.get('ua') || '';
                const ref = params.get('ref') || '';
                const drm = params.get('drm') || '';

                // رابط الـ Intent
                const intentLink = `intent://play?code=${encodedUrl}&ua=${encodeURIComponent(ua)}&ref=${encodeURIComponent(ref)}&drm=${encodeURIComponent(drm)}#Intent;scheme=ballon;package=com.ballon.player;S.browser_fallback_url=${encodeURIComponent(apkUrl)};end`;

                // --- الخطة الذكية للتحويل ---
                
                // 1. محاولة فتح التطبيق
                window.location.href = intentLink;

                // 2. وضع مؤقت (ثلاث ثواني)
                // إذا لم يختفِ المتصفح (يعني التطبيق لم يفتح)، سنقوم بالتحويل يدوياً
                const startTime = Date.now();
                setTimeout(function() {
                    // إذا استغرق الوقت أكثر من ثانية ونصف ولا زلنا في المتصفح
                    if (Date.now() - startTime < 3500) {
                        document.getElementById('msg').innerText = "المشغل غير موجود!";
                        document.getElementById('manual-check').style.display = 'block';
                        document.getElementById('sub-msg').style.display = 'none';
                        
                        // تحويل تلقائي للتحميل لضمان عدم ظهور الخطأ
                        window.location.href = apkUrl;
                    }
                }, 2500);

            } else {
                document.body.innerHTML = "<h2>خطأ: لا يوجد رابط فيديو</h2>";
            }
        };
    </script>
</body>
</html>
