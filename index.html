<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayerBallon Pro | Secure Redirect</title>
    <style>
        body { background: #0F172A; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .loader { border: 6px solid #1E293B; border-top: 6px solid #FF0000; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #FF0000; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>جاري تشفير الرابط والفتح في PLAYER BALLON PRO</h2>
    <p>برجاء الانتظار ثانية واحدة...</p>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const rawUrl = params.get('url'); 
            const ua = params.get('ua') || '';
            const ref = params.get('ref') || '';

            if (rawUrl) {
                // تشفير الرابط لـ Base64
                const encodedUrl = btoa(unescape(encodeURIComponent(rawUrl)));

                // بناء رابط الـ Intent
                const intentLink = `intent://play?code=${encodedUrl}&ua=${encodeURIComponent(ua)}&ref=${encodeURIComponent(ref)}#Intent;scheme=ballon;package=com.ballon.player;S.browser_fallback_url=https://github.com/Ballon17/PlayerBallon;end`;

                // القفز للتطبيق
                window.location.href = intentLink;
            } else {
                document.body.innerHTML = "<h1>خطأ: لا يوجد رابط فيديو!</h1>";
            }
        };
    </script>
</body>
</html>
